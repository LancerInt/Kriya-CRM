# ════════════════════════════════════════════════════════════════════════
# Kriya CRM — Render Blueprint  (OPTIMIZED PRODUCTION ≈ $55.50/mo)
#
# Provisioned ON RENDER (3 services):
#   • PostgreSQL    (basic-1gb, 1 GB RAM, 10 GB, daily backups)  $23.50/mo
#   • Django API    (Standard, 2 GB RAM, 1 CPU, no sleep)        $25/mo
#   • Celery worker (Starter; beat embedded via `-B`)            $ 7/mo
#                                                          ────────────
#                                                          Render subtotal ≈ $55.50/mo
#
# Provisioned ELSEWHERE (free):
#   • Redis           → Upstash free tier (10 K commands/day)    $ 0
#   • Next.js web     → Cloudflare Pages (free, edge-cached)     $ 0
#   • File storage    → Cloudflare R2    (10 GB free)            $ 0
#                                                          ────────────
#                                                          GRAND TOTAL ≈ $55.50/mo
#
# Set these env vars in each Render service's dashboard:
#   • REDIS_URL — paste the Upstash connection string (sync: false)
#   • R2_*      — Cloudflare R2 credentials (sync: false)
#   • Email/AI keys — sync: false, leave blank if unused
#
# Deploy: push, then Render → New + → Blueprint → connect repo → confirm.
# Fill the secrets marked `sync: false` in each service's Environment tab.
# Frontend is deployed separately via Cloudflare Pages (not in this file).
# ════════════════════════════════════════════════════════════════════════

databases:
  - name: kriya-crm-db
    plan: basic-1gb       # 1 GB RAM, 10 GB storage, daily backups ($19/mo).
                          # Bump to a pro-* tier later if you need point-in-time recovery.
    databaseName: kriya_crm
    user: kriya_crm

services:
  # ─── Django backend (gunicorn) ──────────────────────────────────────
  - type: web
    name: kriya-crm-api
    runtime: python
    plan: standard        # 2 GB RAM, 1 CPU
    rootDir: backend
    healthCheckPath: /healthz/
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --workers 4 --timeout 120 --max-requests 1000 --max-requests-jitter 100
    # Media storage is offloaded to Cloudflare R2 (see USE_R2_STORAGE below).
    # Render's filesystem is ephemeral — without R2, uploads would vanish on
    # every redeploy. With R2 enabled, no persistent disk is needed.
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: kriya-crm-db
          property: connectionString
      # Redis is on Upstash (free tier). Paste the connection string here:
      # rediss://default:<pass>@<host>:6379  (note: rediss:// for TLS).
      - key: REDIS_URL
        sync: false
      # Celery broker + result backend reuse REDIS_URL (set in settings.base).
      # ── Set in the Render dashboard after first deploy ──
      - key: ALLOWED_HOSTS
        sync: false                # e.g. kriya-crm-api.onrender.com,api.kriya.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false                # e.g. https://kriya-crm.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false                # same as CORS_ALLOWED_ORIGINS
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SIGNATURE_LOGO_URL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      # Flip to "31536000" (1 year) after a week of healthy uptime.
      - key: SECURE_HSTS_SECONDS
        value: "0"
      # ── Cloudflare R2 object storage ────────────────────────────────
      # USE_R2_STORAGE flips Django's DEFAULT_FILE_STORAGE from local disk
      # to R2. Keep all four R2_* secrets aligned with the API token issued
      # for the kriya-crm-files bucket (Cloudflare dashboard → R2 → API).
      - key: USE_R2_STORAGE
        value: "True"
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false                # e.g. kriya-crm-files
      - key: R2_ENDPOINT_URL
        sync: false                # e.g. https://<account-id>.r2.cloudflarestorage.com
      - key: R2_REGION
        value: "auto"

  # ─── Celery worker + beat (combined via `-B` flag) ──────────────────
  # Single Starter container runs async tasks (emails, AI, PDFs) AND the
  # scheduled-task clock. Saves one $7 service vs. running them separately.
  # If you ever scale beyond one worker container, split beat back out
  # (only ONE beat instance is allowed to run at a time globally).
  - type: worker
    name: kriya-crm-worker
    runtime: python
    plan: starter         # 512 MB, fine for combined worker + beat
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --beat --loglevel=info --concurrency=4 --max-tasks-per-child=200
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: kriya-crm-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: kriya-crm-db
          property: connectionString
      - key: REDIS_URL
        sync: false                # Upstash connection string (rediss://...)
      - key: ALLOWED_HOSTS
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── Cloudflare R2 object storage (PDF generators upload here) ──
      - key: USE_R2_STORAGE
        value: "True"
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_REGION
        value: "auto"

# ── Frontend (Cloudflare Pages, free) ───────────────────────────────────
# The Next.js app is deployed separately on Cloudflare Pages — see
# DEPLOY.md or pages.cloudflare.com. Build command: `npm ci && npm run build`,
# build output: `.next`. Set NEXT_PUBLIC_API_URL=https://<api>.onrender.com/api
# in the Pages project's environment variables.
